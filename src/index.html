<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://puter.com https://*.puter.com; script-src 'self' 'unsafe-inline' https://puter.com https://*.puter.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://puter.com https://*.puter.com; frame-src https://puter.com https://*.puter.com;" />
  <title>Puter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --accent: #4f8ef7;
      --accent-glow: rgba(79,142,247,0.25);
      --accent-2: #a78bfa;
      --text: #f0f0f8;
      --text-muted: rgba(240,240,248,0.45);
      --error: #f87171;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,142,247,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(167,139,250,0.12) 0%, transparent 55%),
        var(--bg);
    }
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    }

    /* ── Screens ── */
    .screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: translateY(20px);
    }

    /* ── Login Card ── */
    .card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border) inset;
      backdrop-filter: blur(20px);
    }

    .logo-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 54px; height: 54px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 24px var(--accent-glow);
      font-size: 26px;
    }
    .logo-name {
      font-family: 'Sora', sans-serif;
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--text) 60%, var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-tag {
      font-size: 13px; color: var(--text-muted);
      margin-top: -6px; letter-spacing: 0.2px;
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px; font-weight: 500;
      color: var(--text-muted); letter-spacing: 0.6px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%; padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: var(--text-muted); }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .error-msg {
      display: none;
      font-size: 12px; color: var(--error);
      margin-top: 6px; padding: 0 4px;
    }
    .error-msg.show { display: block; }

    .btn-login {
      width: 100%; margin-top: 8px;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,142,247,0.4);
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-login:active { transform: scale(0.98); opacity: 0.9; }
    .btn-login.loading { pointer-events: none; opacity: 0.7; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .btn-guest {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .btn-guest:active { background: var(--surface-2); color: var(--text); }

    .footer-links {
      margin-top: 20px;
      display: flex; justify-content: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .footer-links a { color: var(--accent); text-decoration: none; }

    /* ── WebView Screen ── */
    #webview-screen {
      padding: 0;
      background: var(--bg);
    }
    #puter-webview {
      width: 100%; height: 100%;
      border: none;
      background: transparent;
    }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading overlay for webview ── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 20;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    #loading-overlay .spinner {
      width: 36px; height: 36px;
      border-width: 3px;
    }
    #loading-overlay p { color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<!-- ── LOGIN SCREEN ── -->
<div class="screen" id="login-screen">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">☁️</div>
      <div class="logo-name">Puter</div>
      <div class="logo-tag">The Internet OS</div>
    </div>

    <div class="field">
      <label>Username or Email</label>
      <input type="text" id="username" placeholder="you@example.com" autocomplete="username" autocapitalize="none" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <div class="error-msg" id="auth-error">Incorrect credentials. Please try again.</div>
    </div>

    <button class="btn-login" id="btn-login" onclick="handleLogin()">
      Sign In
    </button>

    <div class="divider"><span>or continue without account</span></div>

    <button class="btn-guest" onclick="launchPuter('guest')">
      Continue as Guest
    </button>

    <div class="footer-links">
      <span>No account?</span>
      <a href="#" onclick="openSignup()">Create one free</a>
    </div>
  </div>
</div>

<!-- ── WEBVIEW SCREEN ── -->
<div class="screen hidden" id="webview-screen">
  <iframe
    id="puter-webview"
    src="about:blank"
    allow="fullscreen; clipboard-read; clipboard-write; microphone; camera; display-capture"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads allow-pointer-lock allow-modals"
  ></iframe>
</div>

<!-- ── LOADING OVERLAY ── -->
<div id="loading-overlay" style="display:none;">
  <div class="spinner"></div>
  <p>Launching Puter…</p>
</div>

<script>
  const PUTER_URL = 'https://puter.com';

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('btn-login');

    errEl.classList.remove('show');

    if (!username || !password) {
      errEl.textContent = 'Please enter your username and password.';
      errEl.classList.add('show');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span>';
    btn.classList.add('loading');

    try {
      const resp = await fetch('https://api.puter.com/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await resp.json();

      if (resp.ok && (data.token || data.success)) {
        const token = data.token || '';
        launchPuter('login', token);
      } else {
        throw new Error(data.message || 'Auth failed');
      }
    } catch (e) {
      errEl.textContent = e.message || 'Login failed. Check your credentials.';
      errEl.classList.add('show');
      btn.innerHTML = 'Sign In';
      btn.classList.remove('loading');
    }
  }

  function launchPuter(mode, token = '') {
    const overlay = document.getElementById('loading-overlay');
    overlay.style.display = 'flex';
    overlay.classList.remove('fade-out');

    let url = PUTER_URL;
    if (mode === 'login' && token) {
      url = `${PUTER_URL}?auth_token=${encodeURIComponent(token)}`;
    }

    const iframe = document.getElementById('puter-webview');
    iframe.src = url;

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('webview-screen').classList.remove('hidden');

    iframe.onload = () => {
      setTimeout(() => {
        overlay.classList.add('fade-out');
        setTimeout(() => { overlay.style.display = 'none'; }, 500);
      }, 800);
    };
  }

  function openSignup() {
    // Use Capacitor Browser or open in the app's webview
    launchPuter('signup');
    const iframe = document.getElementById('puter-webview');
    iframe.src = `${PUTER_URL}/signup`;
  }

  // Enter key triggers login
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  // Prevent pull-to-refresh on mobile
  document.addEventListener('touchmove', e => {
    if (e.target === document.body) e.preventDefault();
  }, { passive: false });
</script>
</body>
</html>
